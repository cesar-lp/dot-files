[env]
TERM = "xterm-256color"

# Use a Nerd Font so Neovim (nvim-tree, alpha, etc.) can show icons.
# Install: brew install --cask font-jetbrains-mono-nerd-font
# If icons still show as ?, list names: fc-list | grep -i jetbrains
[font]
size = 13.5

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[scrolling]
history = 100000
multiplier = 3

[selection]
save_to_clipboard = true

[terminal.shell]
program = "/bin/zsh"

[window]
dynamic_padding = true
opacity = 1.0

[window.padding]
x = 6
y = 6

[colors]
draw_bold_text_with_bright_colors = false

[general]
live_config_reload = true
import = ["themes/rose-pine.toml"]

[terminal]
