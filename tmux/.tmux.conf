##### ===============================
##### Core Settings
##### ===============================

# Prefix
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Index from 1
set -g base-index 1
setw -g pane-base-index 1

# Rename behavior
set -g automatic-rename on
set -g set-titles on

# History
set -g history-limit 10000

# Vi mode everywhere
set -g status-keys vi
setw -g mode-keys vi

# Monitor activity
setw -g monitor-activity on

# Mouse
set -g mouse on

##### ===============================
##### Splits
##### ===============================

bind v split-window -h
bind t split-window -v

##### ===============================
##### Pane Navigation (Vim Smart)
##### ===============================

# If in vim/nvim → send keys
# Else → move pane

bind -n C-h if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(vim|nvim)'" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(vim|nvim)'" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(vim|nvim)'" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(vim|nvim)'" "send-keys C-l" "select-pane -R"

# Prefix + h/j/k/l to move panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

##### ===============================
##### Resize Panes (Clean Model)
##### ===============================

# Prefix + Shift + HJKL → resize by 5
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

##### ===============================
##### Window Navigation
##### ===============================

# Shift arrows → switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Quick last window
bind n last-window

##### ===============================
##### Reload Config
##### ===============================

bind r source-file ~/.tmux.conf \; display-message "Config Reloaded ✔"

##### ===============================
##### Status Bar
##### ===============================

set -g status-position bottom
set -g status-interval 5
set -g status-style bg=colour234,fg=colour137,dim

set -g status-left ''
set -g status-right '#[fg=colour233,bg=colour241,bold] %d/%m #[fg=colour233,bg=colour245,bold] %H:%M '

set -g status-right-length 50
set -g status-left-length 20

##### Window Format (Directory Name Only)

set -g window-status-format '#I:#(basename "#{pane_current_path}")#F'
set -g window-status-current-format '#[fg=colour231,bg=colour238,bold] #I:#(basename "#{pane_current_path}")#F '

setw -g window-status-style fg=colour138,bg=colour235
setw -g window-status-current-style fg=colour231,bg=colour238,bold
setw -g window-status-bell-style fg=colour255,bg=colour1,bold

##### ===============================
##### Neovim Improvements
##### ===============================

# Reduce ESC delay
set -sg escape-time 10

# Focus events for modern terminals
set -g focus-events on

# Truecolor (modern way)
set -as terminal-features ",xterm-256color:RGB"

##### ===============================
##### Plugins (TPM)
##### ===============================

set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'

# Keep this line at the bottom so TPM can manage plugins
run '~/.tmux/plugins/tpm/tpm'